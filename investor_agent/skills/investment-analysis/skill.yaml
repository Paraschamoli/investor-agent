id: investment-analysis-v1
name: investment-analysis
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Investment analysis agent that fetches market data, financial statements, sentiment indicators,
  and technical analysis using Yahoo Finance, CNN Fear & Greed, Nasdaq, and Google Trends APIs.
  Generates investment analysis reports in markdown format.

# Tags and Modes
tags:
  - investment-analysis
  - financial-data
  - stock-analysis
  - market-sentiment
  - technical-indicators

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Analyze Apple (AAPL) stock for potential investment"
  - "Get market movers and fear & greed index"
  - "Show me Tesla's financial statements"
  - "What are the earnings for this week?"
  - "Get institutional holders for NVDA"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Fetch and analyze financial data from Yahoo Finance and other APIs"
    features:
      - "Market movers (gainers, losers, most-active) via Yahoo Finance HTML scraping"
      - "Ticker data including info, calendar, news, recommendations, upgrades/downgrades"
      - "Price history with configurable periods (1d to max)"
      - "Financial statements (income, balance, cash) quarterly or annual"
      - "Institutional and mutual fund holders"
      - "Earnings history with surprise data"
      - "Insider trades"
      - "Options chain with filtering by date, strike, type"
      - "CNN Fear & Greed Index (multiple indicators)"
      - "Crypto Fear & Greed Index from alternative.me"
      - "Google Trends data for keywords"
      - "Nasdaq earnings calendar by date"
      - "Technical indicators (SMA, EMA, RSI, MACD, BBANDS) if TA-Lib installed"
    limitations: "Data from Yahoo Finance may be delayed; TA-Lib required for technical indicators; no real-time streaming"

  secondary_capability:
    supported: true
    description: "LLM-based analysis using OpenRouter model"
    features:
      - "Uses OpenRouter API with configurable model (default: anthropic/claude-3.5-sonnet)"
      - "Agent generates markdown reports with investment thesis"
      - "Mem0 integration for memory if API key provided"
      - "Async task handling via bindufy framework"
    limitations: "Analysis quality depends on LLM model; no built-in portfolio optimization algorithms"

# Requirements
requirements:
  packages:
    - "agno>=2.2.0"
    - "bindu>=2026.1.7"
    - "yfinance[nospam]>=0.2.66"
    - "pandas>=2.3.3"
    - "numpy>=2.0"
    - "httpx>=0.28.1"
    - "hishel>=1.0.0"
    - "tenacity>=9.1.2"
    - "pytrends>=4.9.2"
    - "openai>=1.60.0"
    - "python-dotenv>=1.0.1"
  system:
    - "Python 3.12+"
    - "Internet access required"
    - "TA-Lib optional for technical indicators"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 5000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - get_market_movers
  - get_cnn_fear_greed_index
  - get_crypto_fear_greed_index
  - get_google_trends
  - get_ticker_data
  - get_options
  - get_price_history
  - get_financial_statements
  - get_institutional_holders
  - get_earnings_history
  - get_insider_trades
  - get_nasdaq_earnings_calendar
  - calculate_technical_indicator
  - Mem0Tools

# Rich Documentation
documentation:
  overview: |
    Investment analysis agent built on Agno framework with OpenRouter LLM.
    Uses 13 specialized tools to fetch data from Yahoo Finance, CNN, Nasdaq, and Google Trends.
    Agent is initialized lazily on first request and runs async via bindufy server.

  use_cases:
    when_to_use:
      - "Single stock fundamental analysis"
      - "Market sentiment monitoring"
      - "Earnings calendar tracking"
      - "Institutional flow analysis"
      - "Technical indicator calculation"

    when_not_to_use:
      - "Real-time trading execution"
      - "Portfolio backtesting"
      - "Algorithmic trading strategies"
      - "Non-financial data analysis"

  input_structure: |
    JSON-RPC 2.0 message with user query in parts array.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "Analyze Apple (AAPL) stock for potential investment"
            }
          ],
          "kind": "message",
          "messageId": "7c41a910-5616-49ad-b187-d93cbb400001",
          "contextId": "7c41a910-5616-49ad-b187-d93cbb400002",
          "taskId": "7c41a910-5616-49ad-b187-d93cbb400003"
        },
        "skillId": "investment-analysis-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "7c41a910-5616-49ad-b187-d93cbb400003"
    }

  output_format: |
    JSON-RPC 2.0 result with task history and artifacts containing markdown analysis.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "7c41a910-5616-49ad-b187-d93cbb400004",
      "result": {
        "id": "7c41a910-5616-49ad-b187-d93cbb400003",
        "context_id": "7c41a910-5616-49ad-b187-d93cbb400002",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-06T12:32:09.822685+00:00"
        },
        "history": [
          {
            "kind": "message",
            "role": "user",
            "parts": [{"kind": "text", "text": "Analyze Apple (AAPL) stock..."}]
          },
          {
            "kind": "message",
            "role": "assistant",
            "parts": [{"kind": "text", "text": "# Investment Analysis: Apple Inc. (AAPL)..."}]
          }
        ],
        "artifacts": [
          {
            "name": "result",
            "parts": [{"kind": "text", "text": "Markdown formatted investment analysis"}]
          }
        ]
      }
    }

  error_handling:
    - "API failures: Retry with exponential backoff (3 attempts)"
    - "Rate limits: Automatic retry with 2-30 second delays"
    - "Invalid ticker: Return error message with validation guidance"
    - "Missing TA-Lib: Skip technical indicators, continue with other analysis"
    - "Network errors: Graceful degradation with partial results"

  examples:
    - title: "Comprehensive Stock Analysis"
      input:
        parts:
          - kind: "text"
            text: "Provide a comprehensive investment analysis of Apple (AAPL)"
      output:
        text: |
          # Investment Analysis: Apple Inc. (AAPL)

          ## Executive Summary
          Apple Inc. continues to demonstrate strong market leadership and financial performance.
          **BUY** rating with 12-month price target of $295 (13.3% upside from $260.29).

          ## Key Financial Metrics
          - Market Cap: $3.83T
          - Revenue (TTM): $435.62B
          - P/E Ratio: 32.91 (Forward: 27.94)
          - Operating Margin: 35.37%

          ## Investment Thesis
          - Strong ecosystem and services growth
          - Robust financial position with cash generation
          - AI integration opportunities
          - Premium brand positioning

          ## Risks
          - Product cycle dependency
          - Regulatory scrutiny
          - Competition from Android ecosystem

  best_practices:
    for_developers:
      - "Set OPENROUTER_API_KEY and MEM0_API_KEY environment variables"
      - "Use --model flag to specify different OpenRouter models"
      - "Install TA-Lib for technical indicator support: pip install ta-lib"
      - "Handle rate limits from Yahoo Finance with retry logic"

    for_orchestrators:
      - "Route stock analysis and market data queries to this skill"
      - "Expect 5-15 second processing time per request"
      - "Check task status via tasks/get endpoint"
      - "Monitor for rate limit errors from external APIs"
      - "Chain with portfolio management or risk assessment skills"

  installation: |
    Install via uv package manager.

    Required packages:
    uv sync

    Environment variables:
    OPENROUTER_API_KEY=<your-key>
    MEM0_API_KEY=<your-key>  # Optional

    Run:
    uv run python -m investor_agent --model anthropic/claude-3.5-sonnet

  versioning:
    - version: "1.0.0"
      date: "2026-01-12"
      changes: "Initial release with 13 financial analysis tools"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "stock"
    - "investment"
    - "market"
    - "financial"
    - "ticker"
    - "analysis"
    - "earnings"
    - "portfolio"

  specializations:
    - domain: "financial-analysis"
      confidence_boost: 0.3
    - domain: "market-research"
      confidence_boost: 0.2

  anti_patterns:
    - "Real-time trading execution"
    - "Portfolio backtesting"
    - "Non-financial content analysis"
    - "Image or video processing"

  complexity_indicators:
    simple:
      - "Get market movers"
      - "Fetch stock price"
    medium:
      - "Analyze single stock with financials"
      - "Check earnings calendar"
    complex:
      - "Comprehensive investment analysis with multiple data sources"
      - "Multi-stock comparison with technical indicators"
